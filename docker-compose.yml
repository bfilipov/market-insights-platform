version: '3.8'

services:
  api_gateway:
    build:
      context: ./services/api_gateway
      dockerfile: Dockerfile
    container_name: api_gateway_service
    ports:
      - "8000:8000"
    environment:
      # Server
      - API_GATEWAY_HOST=${API_GATEWAY_HOST:-0.0.0.0}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT:-8000}
      # Admin key for user-management endpoints
      - API_GATEWAY_ADMIN_API_KEY=${API_GATEWAY_ADMIN_API_KEY}
      # Optional: seeds the first user's key on bootstrap
      - API_GATEWAY_API_KEY=${API_GATEWAY_API_KEY:-}
      # User store file
      - API_KEYS_FILE=/data/users.json
      # Inter-service URLs (Docker DNS)
      - MARKET_DATA_SERVICE_URL=${MARKET_DATA_SERVICE_URL:-http://market_data:8001}
      - SERVICES_INTERNAL_API_KEY=${SERVICES_INTERNAL_API_KEY}
      - MARKET_SIGNAL_SERVICE_URL=${MARKET_SIGNAL_SERVICE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
    depends_on:
      - market_data
    networks:
      - backend_network
    restart: unless-stopped

  market_data:
    build:
      context: ./services/market_data
      dockerfile: Dockerfile
    container_name: market_data_service
    ports:
      - "8001:8001"
    environment:
      - MARKET_DATA_HOST=${MARKET_DATA_HOST:-0.0.0.0}
      - MARKET_DATA_PORT=${MARKET_DATA_PORT:-8001}
      - SERVICES_INTERNAL_API_KEY=${SERVICES_INTERNAL_API_KEY}
      - MARKET_DATA_DEFAULT_PROVIDER=${MARKET_DATA_DEFAULT_PROVIDER:-coingecko}
      - COINGECKO_BASE_URL=${COINGECKO_BASE_URL:-https://api.coingecko.com/api/v3}
      - COINCAP_BASE_URL=${COINCAP_BASE_URL:-https://rest.coincap.io/v3}
      - COINCAP_API_KEY=${COINCAP_API_KEY}
      - MARKET_DATA_REQUEST_TIMEOUT=${MARKET_DATA_REQUEST_TIMEOUT:-10.0}
      - MARKET_DATA_MAX_RETRIES=${MARKET_DATA_MAX_RETRIES:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - backend_network
    restart: unless-stopped

  market_signal:
    build:
      context: ./services/market_signal
      dockerfile: Dockerfile
    container_name: market_signal_service
    ports:
      - "8002:8002"
    environment:
      - MARKET_SIGNAL_HOST=0.0.0.0
      - MARKET_SIGNAL_PORT=8002
      - SERVICES_INTERNAL_API_KEY=${SERVICES_INTERNAL_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - backend_network
    restart: unless-stopped

networks:
  backend_network:
    driver: bridge